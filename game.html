<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:800px;width:100%;padding:30px}
        h1{text-align:center;color:#667eea;margin-bottom:30px;font-size:2.5em}
        .screen{display:none}
        .screen.active{display:block}
        .btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:15px 30px;border-radius:25px;font-size:18px;cursor:pointer;margin:10px 0;width:100%}
        .btn:hover{transform:translateY(-2px)}
        .btn:disabled{background:#ccc;cursor:not-allowed;transform:none}
        .btn-small{padding:10px 20px;font-size:14px;width:auto}
        .btn-success{background:linear-gradient(135deg,#4facfe,#00f2fe)}
        .btn-danger{background:linear-gradient(135deg,#f093fb,#f5576c)}
        input,select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:15px}
        .room-code{background:#f5f5f5;padding:15px;border-radius:10px;text-align:center;font-size:24px;font-weight:700;letter-spacing:5px;color:#667eea;margin:20px 0;cursor:pointer}
        .players-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:20px 0}
        .player-card{background:linear-gradient(135deg,#f5f7fa,#c3cfe2);padding:15px;border-radius:10px;text-align:center}
        .player-card.explaining{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .player-avatar{width:50px;height:50px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;color:#fff}
        .game-area{background:#f9f9f9;border-radius:15px;padding:20px;margin:20px 0}
        .timer-circle{width:100px;height:100px;border-radius:50%;border:5px solid #667eea;display:inline-flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#667eea;margin:20px}
        .timer-circle.warning{border-color:#f5576c;color:#f5576c;animation:pulse 1s infinite}
        .phrase-display{background:#fff;padding:20px;border-radius:10px;text-align:center;font-size:28px;font-weight:700;color:#333;margin:20px 0;border:3px dashed #667eea}
        .chat-area{background:#fff;border-radius:10px;padding:15px;margin:20px 0;max-height:300px;overflow-y:auto}
        .chat-message{margin-bottom:10px;padding:10px;border-radius:10px;background:#f0f0f0}
        .chat-message.correct{background:#d4edda;border-left:4px solid #28a745}
        .chat-input-group{display:flex;gap:10px;margin-top:15px}
        .chat-input-group input{flex:1;margin-bottom:0}
        .score-board{display:flex;justify-content:space-around;background:#fff;padding:15px;border-radius:10px;margin:15px 0;flex-wrap:wrap}
        .score-item{text-align:center}
        .score-value{font-size:28px;font-weight:700;color:#667eea}
        .winner-animation{animation:pulse .5s infinite;font-size:32px;color:#f5576c;text-align:center}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:20px 0}
        .stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;border-radius:10px;text-align:center}
        .stat-value{font-size:36px;font-weight:700}
        .stat-label{font-size:14px;opacity:.9}
    </style>
</head>
<body>
    <div class="container">
        <h1>Word Game</h1>
        <div id="menuScreen" class="screen active">
            <button class="btn" onclick="showScreen('createScreen')">Create Room</button>
            <button class="btn" onclick="showScreen('joinScreen')">Join Room</button>
            <button class="btn btn-success" onclick="showScreen('statsScreen')">Stats</button>
        </div>
        <div id="createScreen" class="screen">
            <h2>Create Room</h2>
            <input type="text" id="createNickname" placeholder="Nickname" maxlength="20">
            <select id="createCategory">
                <option value="Mixed">Mixed</option>
                <option value="Animals">Animals</option>
                <option value="Professions">Professions</option>
                <option value="Food">Food</option>
                <option value="Sports">Sports</option>
            </select>
            <select id="createRounds">
                <option value="5">5 rounds</option>
                <option value="10" selected>10 rounds</option>
                <option value="15">15 rounds</option>
            </select>
            <select id="createTimer">
                <option value="30">30 sec</option>
                <option value="60" selected>60 sec</option>
                <option value="90">90 sec</option>
            </select>
            <button class="btn" onclick="createRoom()">Create</button>
            <button class="btn btn-small" onclick="showScreen('menuScreen')">Back</button>
        </div>
        <div id="joinScreen" class="screen">
            <h2>Join Room</h2>
            <input type="text" id="joinNickname" placeholder="Nickname" maxlength="20">
            <input type="text" id="joinRoomCode" placeholder="Room code" maxlength="6">
            <button class="btn" onclick="joinRoom()">Join</button>
            <button class="btn btn-small" onclick="showScreen('menuScreen')">Back</button>
        </div>
        <div id="lobbyScreen" class="screen">
            <h2>Lobby</h2>
            <div class="room-code" onclick="copyRoomCode()"><span id="lobbyRoomCode">------</span></div>
            <div id="lobbyInfo" style="margin:10px 0;color:#666"></div>
            <h3>Players:</h3>
            <div class="players-list" id="lobbyPlayers"></div>
            <button class="btn btn-success" id="startGameBtn" onclick="startGame()" disabled>Waiting for players...</button>
            <button class="btn btn-small btn-danger" onclick="leaveRoom()">Leave Room</button>
        </div>
        <div id="gameScreen" class="screen">
            <div class="game-area">
                <div id="roundInfo" style="text-align:center;font-size:18px;color:#666"></div>
                <div style="text-align:center"><div class="timer-circle" id="timerDisplay">60</div></div>
                <div id="explainerInfo" style="text-align:center;margin:10px 0"></div>
                <div class="phrase-display" id="phraseDisplay" style="display:none">Word: <span id="currentPhrase"></span></div>
                <div class="score-board" id="scoreBoard"></div>
                <div class="chat-area" id="chatMessages"></div>
                <div class="chat-input-group">
                    <input type="text" id="chatInput" placeholder="Type your guess...">
                    <button class="btn btn-small" onclick="sendChatMessage()">Send</button>
                    <button class="btn btn-small btn-success" id="voteBtn" onclick="voteWord()" style="display:none">Guessed!</button>
                </div>
            </div>
        </div>
        <div id="endScreen" class="screen">
            <h2 style="text-align:center">Game Over!</h2>
            <div id="winnerDisplay"></div>
            <div class="score-board" id="finalScores"></div>
            <button class="btn" onclick="location.reload()">New Game</button>
        </div>
        <div id="statsScreen" class="screen">
            <h2>Stats</h2>
            <div class="stats-grid" id="statsData"></div>
            <button class="btn btn-small" onclick="showScreen('menuScreen')">Back</button>
        </div>
    </div>
    <script>
        let ws=null,currentPlayerId=null,currentRoomCode=null;
        let gameData={players:[],currentRound:0,maxRounds:0};

        function showScreen(id){
            document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id==='statsScreen')loadStats();
        }

        async function createRoom(){
            const n=document.getElementById('createNickname').value.trim();
            if(!n){alert('Enter nickname!');return}
            try{
                const r=await fetch('/api/rooms/create',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        host_nickname:n,
                        max_rounds:parseInt(document.getElementById('createRounds').value),
                        category:document.getElementById('createCategory').value,
                        timer_seconds:parseInt(document.getElementById('createTimer').value)
                    })
                });
                if(!r.ok)throw new Error('Error');
                const d=await r.json();
                currentPlayerId=d.player_id;
                currentRoomCode=d.room_code;
                connectWS();
                showScreen('lobbyScreen');
                updateLobby();
            }catch(e){alert('Error: '+e.message)}
        }

        async function joinRoom(){
            const n=document.getElementById('joinNickname').value.trim();
            const c=document.getElementById('joinRoomCode').value.trim();
            if(!n||!c){alert('Fill all fields!');return}
            try{
                const r=await fetch('/api/rooms/join',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({nickname:n,room_code:c})
                });
                if(!r.ok)throw new Error('Room not found');
                const d=await r.json();
                currentPlayerId=d.player_id;
                currentRoomCode=c;
                connectWS();
                showScreen('lobbyScreen');
                updateLobby();
            }catch(e){alert('Error: '+e.message)}
        }

        function connectWS(){
            if(ws)ws.close();
            const p=window.location.protocol==='https:'?'wss:':'ws:';
            const url=p+'//'+window.location.host+'/ws/'+currentRoomCode+'/'+currentPlayerId;
            ws=new WebSocket(url);
            ws.onopen=()=>console.log('WS connected');
            ws.onmessage=e=>handleMessage(JSON.parse(e.data));
            ws.onerror=e=>console.error('WS error');
        }

        function handleMessage(m){
            console.log('MSG:',m);
            switch(m.type){
                case'player_joined':case'player_left':updateLobby();break;
                case'game_starting':
                    gameData.currentRound=m.data.current_round;
                    gameData.maxRounds=m.data.max_rounds;
                    showScreen('gameScreen');
                    document.getElementById('phraseDisplay').style.display='none';
                    document.getElementById('roundInfo').textContent='Round '+gameData.currentRound+'/'+gameData.maxRounds;
                    document.getElementById('explainerInfo').innerHTML='Explaining: <strong>'+m.data.explainer.nickname+'</strong>';
                    document.getElementById('voteBtn').style.display=m.data.explainer.id===currentPlayerId?'none':'inline-block';
                    break;
                case'new_round':
                    gameData.currentRound=m.data.round;
                    document.getElementById('phraseDisplay').style.display='none';
                    document.getElementById('voteBtn').style.display='none';
                    document.getElementById('roundInfo').textContent='Round '+m.data.round+'/'+gameData.maxRounds;
                    document.getElementById('explainerInfo').innerHTML='Explaining: <strong>'+m.data.explainer.nickname+'</strong>';
                    document.getElementById('voteBtn').style.display=m.data.explainer.id===currentPlayerId?'none':'inline-block';
                    break;
                case'new_phrase':
                    document.getElementById('phraseDisplay').style.display='block';
                    document.getElementById('currentPhrase').textContent=m.data.phrase;
                    document.getElementById('voteBtn').style.display='none';
                    break;
                case'timer_update':
                    var t=document.getElementById('timerDisplay');
                    t.textContent=m.data.seconds;
                    t.parentElement.classList.toggle('warning',m.data.seconds<=10);
                    break;
                case'chat_message':
                    var a=document.getElementById('chatMessages');
                    var d=document.createElement('div');
                    d.className='chat-message';
                    var p=gameData.players.find(x=>x.id===m.data.player_id);
                    d.innerHTML='<strong>'+(p?p.nickname:'Player')+':</strong> '+m.data.message;
                    a.appendChild(d);
                    a.scrollTop=a.scrollHeight;
                    break;
                case'score_update':
                    var s=document.getElementById('scoreBoard');
                    s.innerHTML='';
                    Object.entries(m.data.scores).forEach(([pid,sc])=>{
                        var pl=gameData.players.find(x=>x.id===parseInt(pid));
                        if(pl)s.innerHTML+='<div class="score-item"><div>'+pl.nickname+'</div><div class="score-value">'+sc+'</div></div>';
                    });
                    break;
                case'word_guessed':
                    var a2=document.getElementById('chatMessages');
                    var d2=document.createElement('div');
                    d2.className='chat-message correct';
                    d2.textContent='Guessed: '+m.data.phrase;
                    a2.appendChild(d2);
                    a2.scrollTop=a2.scrollHeight;
                    break;
                case'game_end':
                    showScreen('endScreen');
                    document.getElementById('winnerDisplay').innerHTML='<div class="winner-animation">'+m.data.winner+' wins!</div>';
                    var f=document.getElementById('finalScores');
                    f.innerHTML='';
                    Object.entries(m.data.final_scores).forEach(([n,sc])=>{
                        f.innerHTML+='<div class="score-item"><div>'+n+'</div><div class="score-value">'+sc+'</div></div>';
                    });
                    break;
            }
        }

        function sendChatMessage(){
            var i=document.getElementById('chatInput');
            var m=i.value.trim();
            if(m&&ws&&ws.readyState===WebSocket.OPEN){
                ws.send(JSON.stringify({type:'chat',data:{message:m}}));
                i.value='';
            }
        }

        function voteWord(){
            if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'vote',data:{word_guessed:true}}));
        }

        function startGame(){
            if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'start_game'}));
        }

        async function updateLobby(){
            try{
                var r=await fetch('/api/rooms/'+currentRoomCode);
                var d=await r.json();
                gameData.players=d.players;
                document.getElementById('lobbyRoomCode').textContent=currentRoomCode;
                document.getElementById('lobbyInfo').innerHTML='Category: '+d.category+' | Rounds: '+d.max_rounds+' | Time: '+d.timer_seconds+'s';
                var l=document.getElementById('lobbyPlayers');
                l.innerHTML='';
                d.players.forEach(p=>{
                    l.innerHTML+='<div class="player-card'+(p.is_explaining?' explaining':'')+'"><div class="player-avatar" style="background:'+p.avatar_color+'">'+p.nickname[0].toUpperCase()+'</div><div><strong>'+p.nickname+'</strong></div><div>Score: '+p.score+'</div>'+(p.id===d.host_player_id?'<div>Host</div>':'')+'</div>';
                });
                var b=document.getElementById('startGameBtn');
                b.disabled=d.players.length<2;
                b.textContent=d.players.length<2?'Waiting for players...':'Start Game!';
            }catch(e){console.error(e)}
        }

        function copyRoomCode(){
            navigator.clipboard.writeText(currentRoomCode);
            alert('Code copied!');
        }

        function leaveRoom(){
            if(ws)ws.close();
            showScreen('menuScreen');
        }

        async function loadStats(){
            try{
                var r=await fetch('/api/stats');
                var d=await r.json();
                document.getElementById('statsData').innerHTML='<div class="stat-card"><div class="stat-value">'+d.total_rooms+'</div><div class="stat-label">Total Rooms</div></div><div class="stat-card"><div class="stat-value">'+d.active_rooms+'</div><div class="stat-label">Active Rooms</div></div><div class="stat-card"><div class="stat-value">'+d.total_players+'</div><div class="stat-label">Players</div></div>';
            }catch(e){console.error(e)}
        }

        setInterval(function(){
            if(document.getElementById('lobbyScreen').classList.contains('active'))updateLobby();
        },3000);

        document.getElementById('chatInput').addEventListener('keypress',function(e){
            if(e.key==='Enter')sendChatMessage();
        });
    </script>
</body>
</html>
